<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunara Studio</title>
    <style>
        /* --- RESET & ROOT SYSTEM --- */
        * {
            margin: 0;
            padding: 0;
            box-index: border-box;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
        }

        :root {
            --bg-pure: #0a0a0a;
            --bg-surface: #121212;
            --bg-card: #181818;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --accent-glow: rgba(0, 242, 254, 0.15);
            --border-color: rgba(255, 255, 255, 0.04);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-pure);
            color: var(--text-main);
            font-family: var(--font-family);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- AMBIENT NEON GLOW BACKGROUNDS --- */
        .ambient-glow-1 {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.05) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: fixed;
            bottom: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.04) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* --- TYPOGRAPHY & WRAPPERS --- */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1440px;
            margin: 0 auto;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo-dot {
            width: 10px;
            height: 10px;
            background: #00f2fe;
            border-radius: 50%;
            box-shadow: 0 0 10px #00f2fe;
        }

        .brand-name {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        /* --- HERO SPLIT GRID --- */
        .hero-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 80px;
            align-items: center;
            margin-top: 40px;
        }

        @media (max-width: 1024px) {
            .hero-grid {
                grid-template-columns: 1fr;
                gap: 60px;
            }
        }

        .hero-text-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.04em;
        }

        @media (max-width: 640px) {
            .hero-title {
                font-size: 2.75rem;
            }
        }

        .hero-title span {
            background: linear-gradient(135deg, #ffffff 30%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-description {
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--text-muted);
            max-width: 540px;
        }

        .cta-container {
            margin-top: 12px;
        }

        .cta-button {
            display: inline-block;
            background: var(--text-main);
            color: var(--bg-pure);
            padding: 16px 32px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,255,255,0.1);
        }

        /* --- PERFORMANCE UPDATED LOGO SHOWCASE CONTAINER --- */
        .showcase-window {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1; /* Pure square for perfect geometric balancing of your logo */
            background: transparent; /* No heavy dark block backgrounds so your transparent asset blends perfectly */
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            perspective: 1000px;
            will-change: transform;
        }

        .showcase-window img {
            width: 85%;
            height: 85%;
            object-fit: contain; /* Prevents your transparent PNG from clipping or stretching out of scale */
            transform: scale(1);
            opacity: 0.95;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5)); /* Adds smooth physical drop projection along the edges */
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s, filter 0.4s;
        }

        /* Elegant response when hovering over the interactive hero window area */
        .showcase-window:hover img {
            transform: scale(1.04) translateZ(25px); /* Subtly floats your identity forward in virtual 3D space */
            opacity: 1;
            filter: drop-shadow(0 30px 60px rgba(0, 242, 254, 0.22)); /* Emits a clean neon backing reflection */
        }
    </style>
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="app-container">
        
        <header>
            <div class="brand-container">
                <div class="brand-logo-dot"></div>
                <div class="brand-name">Mannings Media Group</div>
            </div>
            <div class="status-badge">
                <div class="status-indicator"></div>
                <span>Engine Active</span>
            </div>
        </header>

        <main class="hero-grid">
            
            <section class="hero-text-content">
                <h1 class="hero-title">
                    <span>Next-generation project architectures.</span>
                </h1>
                <p class="hero-description">
                    Engineered to bring clean structures, deep clarity, and elite automation systems to complex production design systems and studio workflows.
                </p>
                <div class="cta-container">
                    <a href="#" class="cta-button">Initiate Project</a>
                </div>
            </section>

            <!-- LOGO PRESENTATION MODULE -->
            <section class="showcase-window hover-target perspective-card">
                <img src="/ManningsMedia/images/logo.png" alt="Mannings Media Group Logo">
            </section>

        </main>

    </div>

    <script>
        // High-fidelity 3D Mouse Trajectory Tracker
        const card = document.querySelector('.perspective-card');
        
        if (card) {
            document.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - (rect.width / 2);
                const y = e.clientY - rect.top - (rect.height / 2);
                
                // Fine-tuned constraints to ensure interactive movement feels premium and smooth
                const rotateX = -(y / (rect.height / 2)) * 12;
                const rotateY = (x / (rect.width / 2)) * 12;
                
                card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            document.addEventListener('mouseleave', () => {
                card.style.transform = 'rotateX(0deg) rotateY(0deg)';
            });
        }
    </script>
</body>
</html>
